# kube-prometheus-stack Helm Values
# Chart: prometheus-community/kube-prometheus-stack v61.7.1
# Includes: Prometheus Operator, Prometheus, Grafana, Alertmanager,
#           node-exporter, kube-state-metrics
# Accessed via: http://prometheus.meghalmathankar.com and http://grafana.meghalmathankar.com
# Traffic flow: Browser --> DNS --> AWS NLB --> ingress-nginx --> Service

fullnameOverride: monitoring

# -------------------------------------------------------
# Prometheus
# -------------------------------------------------------
prometheus:
  enabled: true

  prometheusSpec:
    replicas: 1
    retention: 15d
    retentionSize: "8GB"

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

    # gp3 persistent storage for metrics data
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 20Gi

    # Auto-discover ServiceMonitors and PodMonitors across all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}

  # Prometheus UI exposed via ingress-nginx + NLB
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /
    hosts:
      - prometheus.meghalmathankar.com
    paths:
      - /
    pathType: Prefix

# -------------------------------------------------------
# Grafana
# -------------------------------------------------------
grafana:
  enabled: true
  replicas: 1

  # Admin credentials
  # IMPORTANT: Replace with External Secrets in production
  adminUser: admin
  adminPassword: "changeme"

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # gp3 persistent storage for Grafana config and dashboards
  persistence:
    enabled: true
    storageClassName: gp3
    size: 5Gi
    accessModes:
      - ReadWriteOnce

  # Grafana UI exposed via ingress-nginx + NLB
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /
    hosts:
      - grafana.meghalmathankar.com
    path: /
    pathType: Prefix

  # Pre-configured Prometheus datasource
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://monitoring-prometheus:9090
          isDefault: true
          access: proxy

  # Dashboard provider config
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  # Community dashboards imported by Grafana ID
  dashboards:
    default:
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      node-exporter:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
      nginx-ingress:
        gnetId: 9614
        revision: 1
        datasource: Prometheus
      jenkins:
        gnetId: 9964
        revision: 1
        datasource: Prometheus

  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s/"
    auth:
      disable_login_form: false
    security:
      allow_embedding: true

# -------------------------------------------------------
# Alertmanager
# -------------------------------------------------------
alertmanager:
  enabled: true

  alertmanagerSpec:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi

# -------------------------------------------------------
# Node Exporter
# -------------------------------------------------------
nodeExporter:
  enabled: true

prometheus-node-exporter:
  resources:
    requests:
      cpu: 50m
      memory: 30Mi
    limits:
      cpu: 100m
      memory: 64Mi

# -------------------------------------------------------
# Kube State Metrics
# -------------------------------------------------------
kubeStateMetrics:
  enabled: true

kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# -------------------------------------------------------
# EKS Control Plane - managed by AWS, not accessible
# Disable components that require direct control plane access
# -------------------------------------------------------
kubeEtcd:
  enabled: false

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: true

kubelet:
  enabled: true

coreDns:
  enabled: true

# -------------------------------------------------------
# Default Alerting Rules
# -------------------------------------------------------
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false                     # Disabled - EKS managed
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubelet: true
    kubeProxy: false
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeScheduler: false            # Disabled - EKS managed
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
