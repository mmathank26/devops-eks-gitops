# ingress-nginx Helm Values
# Chart: ingress-nginx/ingress-nginx v4.10.1
# Configured for AWS EKS with Network Load Balancer (NLB)
# Worker nodes are in private subnets - NLB is internet-facing in public subnets

controller:
  # -------------------------------------------------------
  # Replicas & Scheduling
  # -------------------------------------------------------
  replicaCount: 2   # One per AZ for high availability

  # Spread controller pods across availability zones
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-nginx

  # -------------------------------------------------------
  # Resources - sized for t3.large nodes
  # -------------------------------------------------------
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # -------------------------------------------------------
  # AWS NLB Service
  # Worker nodes: private subnets
  # NLB:          public subnets (internet-facing)
  # -------------------------------------------------------
  service:
    type: LoadBalancer
    annotations:
      # Network Load Balancer (not Classic ELB)
      service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
      # Internet-facing NLB in public subnets
      service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
      # IP target mode - routes directly to pod IPs (no NodePort hop)
      service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
      # Health check on the ingress controller healthz endpoint
      service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: "HTTP"
      service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/healthz"
      service.beta.kubernetes.io/aws-load-balancer-healthcheck-port: "10254"

  # -------------------------------------------------------
  # Ingress Class - set as cluster default
  # -------------------------------------------------------
  ingressClassResource:
    name: nginx
    enabled: true
    default: true

  ingressClass: nginx

  # -------------------------------------------------------
  # NGINX ConfigMap tuning
  # -------------------------------------------------------
  config:
    # Pass real client IP through NLB
    use-forwarded-headers: "true"
    compute-full-forwarded-for: "true"
    use-proxy-protocol: "false"
    # Connection settings
    keep-alive: "75"
    keep-alive-requests: "100"
    upstream-keepalive-connections: "10000"
    # JSON access logs for easier parsing (CloudWatch, Loki, etc.)
    log-format-escape-json: "true"
    log-format-upstream: >
      {"time":"$time_iso8601","remote_addr":"$proxy_protocol_addr",
      "x_forwarded_for":"$proxy_add_x_forwarded_for","request_id":"$req_id",
      "remote_user":"$remote_user","bytes_sent":$bytes_sent,
      "request_time":$request_time,"status":$status,"vhost":"$host",
      "request_proto":"$server_protocol","path":"$uri",
      "request_query":"$args","request_length":$request_length,
      "method":"$request_method","http_referrer":"$http_referer",
      "http_user_agent":"$http_user_agent"}

  # -------------------------------------------------------
  # Prometheus metrics
  # -------------------------------------------------------
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: monitoring
      additionalLabels:
        release: monitoring   # Must match Prometheus serviceMonitorSelector

  # -------------------------------------------------------
  # Pod Disruption Budget
  # -------------------------------------------------------
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  # -------------------------------------------------------
  # Admission Webhooks
  # -------------------------------------------------------
  admissionWebhooks:
    enabled: true

# -------------------------------------------------------
# Default Backend
# -------------------------------------------------------
defaultBackend:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 20Mi
    limits:
      cpu: 50m
      memory: 64Mi
