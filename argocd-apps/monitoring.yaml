apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: monitoring
    app.kubernetes.io/part-of: gitops-platform
    app.kubernetes.io/component: observability
  annotations:
    # Deploy after ingress-nginx so Prometheus/Grafana ingress rules work
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default

  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 61.7.1
      helm:
        valueFiles:
          - $values/infrastructure/monitoring/values.yaml
    - repoURL: https://github.com/mmathank26/devops-eks-gitops
      targetRevision: HEAD
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=false
