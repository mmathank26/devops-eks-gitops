# Jenkins Helm Values
# Chart: jenkins/jenkins v5.3.3
# Accessed via: http://jenkins.meghalmathankar.com
# Minimal plugin set - add more via Jenkins UI as needed

controller:
  image:
    tag: "2.504.1-lts"

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1500m
      memory: 2Gi

  javaOpts: >-
    -Xms512m
    -Xmx1536m
    -XX:+UseG1GC
    -Djava.awt.headless=true

  jenkinsUrl: "http://jenkins.meghalmathankar.com"
  jenkinsAdminEmail: "admin@example.com"

  admin:
    username: "admin"
    password: "changeme"

  # -------------------------------------------------------
  # Minimal plugins - only what's needed to run
  # Add more via Jenkins UI: Manage Jenkins > Plugins
  # -------------------------------------------------------
  installPlugins:
    - kubernetes:latest
    - workflow-aggregator:latest
    - git:latest
    - configuration-as-code:latest
    - credentials:latest

  additionalPlugins: []

  # -------------------------------------------------------
  # JCasC - Kubernetes dynamic agents only
  # -------------------------------------------------------
  JCasC:
    defaultConfig: true
    configScripts:
      kubernetes-cloud: |
        jenkins:
          clouds:
            - kubernetes:
                name: "kubernetes"
                serverUrl: "https://kubernetes.default.svc"
                namespace: "jenkins"
                jenkinsUrl: "http://jenkins-controller.jenkins.svc.cluster.local:8080"
                jenkinsTunnel: "jenkins-agent.jenkins.svc.cluster.local:50000"
                connectTimeout: 5
                readTimeout: 15
                containerCapStr: "10"

  # -------------------------------------------------------
  # Ingress
  # -------------------------------------------------------
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "0"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    hostName: jenkins.meghalmathankar.com
    paths:
      - path: /
        pathType: Prefix

  prometheus:
    enabled: false

# -------------------------------------------------------
# Persistent storage
# -------------------------------------------------------
persistence:
  enabled: true
  storageClass: gp3
  size: 20Gi
  accessMode: ReadWriteOnce

# -------------------------------------------------------
# Dynamic agents
# -------------------------------------------------------
agent:
  enabled: true
  resources:
    requests:
      cpu: 256m
      memory: 256Mi
    limits:
      cpu: 512m
      memory: 512Mi
  image:
    repository: "jenkins/inbound-agent"
    tag: "latest"
  workspaceVolume:
    type: EmptyDir

rbac:
  create: true
  readSecrets: false

serviceAccount:
  create: true
  name: jenkins